services:
  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    # depends_on:
    #   - db
    expose:
      - "8000"
    volumes:
      - ./backend/db.sqlite3:/app/db.sqlite3
      - static_volume:/app/staticfiles

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - static_volume:/static
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

