services:
  backend:
    image: ab-apps-backend:latest
    build: ./backend
    env_file:
      - ./backend/.env
    expose:
      - "8000"
    volumes:
      - ./backend/db.sqlite3:/app/db.sqlite3
      - ./backend/static:/app/static
      - ./backend/media:/app/media

  nginx:
    image: ab-apps-nginx:latest
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "80:80"
    volumes:
      - ./backend/static:/static
      - ./backend/media:/media
    depends_on:
      - backend
